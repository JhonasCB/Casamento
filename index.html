function buildInitial() {
  return SEED.map((s, i) => ({ id: i + 1, name: s.n, group: s.g, note: s.note, kids: s.kids, status: s.status || 'invited' }));
}

// ── Countdown ────────────────────────────────────────────────
function useCountdown(target) {
  const [diff, setDiff] = useState(() => target - Date.now());
  useEffect(() => {
    const id = setInterval(() => setDiff(target - Date.now()), 1000);
    return () => clearInterval(id);
  }, [target]);
  const total = Math.max(0, diff);
  return {
    d: Math.floor(total / 86400000),
    h: Math.floor(total / 3600000) % 24,
    m: Math.floor(total / 60000) % 60,
    s: Math.floor(total / 1000) % 60,
  };
}

function Countdown() {
  const { d, h, m, s } = useCountdown(new Date('2027-11-20T18:00:00').getTime());
  const pad = n => String(n).padStart(2, '0');
  return (
    <div className="countdown">
      <div className="cd-block"><div className="cd-num">{d}</div><div className="cd-label">dias</div></div>
      <div className="cd-sep">:</div>
      <div className="cd-block"><div className="cd-num">{pad(h)}</div><div className="cd-label">horas</div></div>
      <div className="cd-sep">:</div>
      <div className="cd-block"><div className="cd-num">{pad(m)}</div><div className="cd-label">min</div></div>
      <div className="cd-sep">:</div>
      <div className="cd-block"><div className="cd-num">{pad(s)}</div><div className="cd-label">seg</div></div>
    </div>
  );
}


// ── GroupBadge ────────────────────────────────────────────────
function GroupBadge({ group }) {
  const g = GROUPS[group] || { label: group, color: '#888', bg: 'rgba(136,136,136,0.12)' };
  return <span className="group-badge" style={{ color: g.color, background: g.bg }}>{group}</span>;
}

// ── StatusPill (click cycles) ─────────────────────────────────
function StatusPill({ status, onChange }) {
  const m = STATUS_META[status] || STATUS_META.invited;
  return (
    <span className={`status-pill ${m.cls}`} onClick={() => {
      const idx = STATUS_CYCLE.indexOf(status);
      onChange(STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length]);
    }} title="Clique para mudar o status">
      {m.label}
    </span>
  );
}

// ── GuestModal ────────────────────────────────────────────────
function GuestModal({ initial, onSave, onClose }) {
  const isNew = !initial;
  const [form, setForm] = useState(
    initial ? { ...initial, kids: [...initial.kids] }
            : { name: '', group: 'FJH', note: '', kids: [], status: 'invited' }
  );
  const [kidInput, setKidInput] = useState('');
  const kidRef = useRef();
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const addKid = () => {
    const v = kidInput.trim();
    if (!v) return;
    setForm(f => ({ ...f, kids: [...f.kids, v] }));
    setKidInput('');
    kidRef.current?.focus();
  };
  const removeKid = i => setForm(f => ({ ...f, kids: f.kids.filter((_, x) => x !== i) }));
  const save = () => { if (form.name.trim()) onSave(form); };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-title">{isNew ? '+ Novo Convidado' : 'Editar Convidado'}</div>
        <div className="form-group">
          <label className="form-label">Nome *</label>
          <input className="form-input" value={form.name} onChange={e => set('name', e.target.value)}
            placeholder="Nome completo" autoFocus onKeyDown={e => e.key === 'Enter' && save()} />
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
          <div className="form-group">
            <label className="form-label">Grupo</label>
            <select className="form-select" value={form.group} onChange={e => set('group', e.target.value)}>
              {Object.entries(GROUPS).map(([k, v]) => <option key={k} value={k}>{k} — {v.label}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">Status</label>
            <select className="form-select" value={form.status} onChange={e => set('status', e.target.value)}>
              {Object.entries(STATUS_META).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
            </select>
          </div>
        </div>
        <div className="form-group">
          <label className="form-label">Observação</label>
          <input className="form-input" value={form.note} onChange={e => set('note', e.target.value)}
            placeholder="ex: cônjuge do Fulano..." />
        </div>
        <div className="form-group">
          <label className="form-label">Crianças</label>
          {form.kids.length > 0 && (
            <div className="children-tags">
              {form.kids.map((k, i) => (
                <div key={i} className="child-tag">{k} <button onClick={() => removeKid(i)}>×</button></div>
              ))}
            </div>
          )}
          <div className="child-input-row">
            <input ref={kidRef} className="form-input" value={kidInput} onChange={e => setKidInput(e.target.value)}
              placeholder="Nome da criança" onKeyDown={e => e.key === 'Enter' && (e.preventDefault(), addKid())} />
            <button className="child-add-btn" onClick={addKid}>+ Add</button>
          </div>
        </div>
        <div className="modal-actions">
          <button className="btn-cancel" onClick={onClose}>Cancelar</button>
          <button className="btn-save" onClick={save}>{isNew ? 'Adicionar' : 'Salvar'}</button>
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────
function App() {
  const [guests, setGuests] = useState([]);
  const [search, setSearch] = useState('');
  const [groupFilter, setGroupFilter] = useState('ALL');
  const [statusFilter, setStatusFilter] = useState('ALL');
  const [showExcluded, setShowExcluded] = useState(false);
  const [sortKey, setSortKey] = useState('name');
  const [sortDir, setSortDir] = useState(1);
  const [modal, setModal] = useState(null);

  useEffect(() => {
    const data = loadGuests();
    if (data) {
      setGuests(data.sort((a, b) => (a.id || 0) - (b.id || 0)));
    } else {
      const initial = buildInitial();
      persistGuests(initial);
      setGuests(initial);
    }
  }, []);

  // ── Derived ─────────────────────────────────────────────────
  const allGroups = [...new Set(SEED.map(s => s.g))];

  const stats = {
    total:     guests.filter(g => g.status !== 'excluded').length,
    confirmed: guests.filter(g => g.status === 'confirmed').length,
    pending:   guests.filter(g => g.status === 'invited').length,
    excluded:  guests.filter(g => g.status === 'excluded').length,
    kids:      guests.reduce((a, g) => a + (g.kids || []).length, 0),
  };

  const filtered = (() => {
    let list = [...guests];
    if (!showExcluded) list = list.filter(g => g.status !== 'excluded');
    if (groupFilter !== 'ALL') list = list.filter(g => g.group === groupFilter);
    if (statusFilter !== 'ALL') list = list.filter(g => g.status === statusFilter);
    if (search) {
      const q = search.toLowerCase();
      list = list.filter(g =>
        g.name.toLowerCase().includes(q) ||
        (g.note || '').toLowerCase().includes(q) ||
        (g.kids || []).some(k => k.toLowerCase().includes(q))
      );
    }
    list.sort((a, b) => {
      const va = sortKey === 'group' ? a.group : a.name.toLowerCase();
      const vb = sortKey === 'group' ? b.group : b.name.toLowerCase();
      return va < vb ? -sortDir : va > vb ? sortDir : 0;
    });
    return list;
  })();

  // ── Handlers ────────────────────────────────────────────────
  const toggleSort = key => { if (sortKey === key) setSortDir(d => -d); else { setSortKey(key); setSortDir(1); } };

  const updateStatus = (id, status) => {
    setGuests(prev => {
      const updated = prev.map(g => g.id === id ? { ...g, status } : g);
      persistGuests(updated);
      return updated;
    });
  };

  const saveGuest = form => {
    if (modal.type === 'add') {
      const id = Date.now();
      setGuests(prev => {
        const updated = [...prev, { ...form, id }];
        persistGuests(updated);
        return updated;
      });
    } else {
      setGuests(prev => {
        const updated = prev.map(g => g.id === modal.guest.id ? { ...form, id: modal.guest.id } : g);
        persistGuests(updated);
        return updated;
      });
    }
    setModal(null);
  };

  const deleteGuest = id => {
    setGuests(prev => {
      const updated = prev.filter(g => g.id !== id);
      persistGuests(updated);
      return updated;
    });
    setModal(null);
  };

  const resetData = () => {
    if (!window.confirm('Isso vai restaurar a lista original. Tem certeza?')) return;
    const initial = buildInitial();
    persistGuests(initial);
    setGuests(initial);
  };

  const exportCSV = () => {
    const rows = [['ID','Nome','Grupo','Status','Observação','Crianças']];
    guests.forEach(g => rows.push([g.id, g.name, g.group, STATUS_META[g.status]?.label || g.status, g.note || '', (g.kids || []).join(' | ')]));
    const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(csv);
    a.download = 'lista-convidados-JJ.csv';
    a.click();
  };

  const arr = (sortDir === 1) ? ' ↑' : ' ↓';

  return (
    <>
      {/* HEADER */}
      <header className="header">
        <div className="header-inner">
          <div className="header-ornament">✦ ✦ ✦</div>
          <div className="header-title">J &amp; J</div>
          <div className="header-divider"><span className="header-diamond">◆</span></div>
          <div className="header-subtitle">20 de Novembro de 2027 — Lista de Convidados</div>
          <Countdown />
        </div>
      </header>

      <main className="main">

        {/* STATS */}
        <div className="stats-grid">
          <div className={`stat-card total${statusFilter==='ALL'&&groupFilter==='ALL'?' active-filter':''}`}
            onClick={() => { setStatusFilter('ALL'); setGroupFilter('ALL'); setShowExcluded(false); }}>
            <div className="stat-number">{stats.total}</div>
            <div className="stat-label">Adultos</div>
          </div>
          <div className={`stat-card confirmed${statusFilter==='confirmed'?' active-filter':''}`}
            onClick={() => setStatusFilter(s => s==='confirmed'?'ALL':'confirmed')}>
            <div className="stat-number">{stats.confirmed}</div>
            <div className="stat-label">Confirmados</div>

                    <td style={{textAlign:'center',whiteSpace:'nowrap'}}>
                      <button className="action-btn" title="Editar" onClick={() => setModal({type:'edit',guest:g})}>✏️</button>
                      <button className="action-btn del" title="Remover" onClick={() => setModal({type:'delete',guest:g})}>🗑️</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>

        {/* LEGEND */}
        <div style={{marginTop:20,display:'flex',flexWrap:'wrap',gap:8}}>
          {Object.entries(GROUPS).map(([k,v]) => (
            <span key={k} className="group-badge" style={{color:v.color,background:v.bg,padding:'4px 10px'}}>
              <strong>{k}</strong> — {v.label}
            </span>
          ))}
        </div>

      </main>

      {modal?.type==='add'    && <GuestModal onSave={saveGuest} onClose={() => setModal(null)} />}
      {modal?.type==='edit'   && <GuestModal initial={modal.guest} onSave={saveGuest} onClose={() => setModal(null)} />}
      {modal?.type==='delete' && <DeleteModal guest={modal.guest} onConfirm={() => deleteGuest(modal.guest.id)} onClose={() => setModal(null)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
