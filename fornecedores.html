<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J & J — Fornecedores</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    /* ── Tema Escuro (padrão) ── */
    :root {
      --bg:            #0C0B09;
      --bg-card:       #161410;
      --bg-input:      #0D0C0A;
      --bg-row-hover:  #181510;
      --text:          #E8DEC8;
      --text-label:    #6B5E45;
      --text-muted:    #5B5040;
      --text-ph:       #4B4030;
      --text-header:   #F5ECD4;
      --text-hsub:     rgba(255,255,255,0.35);
      --accent:        #C9A84C;
      --accent-h:      #E0BC5A;
      --accent-text:   #0C0B09;
      --border:        rgba(255,255,255,0.07);
      --border-input:  rgba(255,255,255,0.1);
      --border-modal:  rgba(201,168,76,0.2);
      --header-bg:     linear-gradient(180deg,#0A0806 0%,#140E06 60%,#0C0B09 100%);
      --header-border: rgba(201,168,76,0.15);
      --divider-color: rgba(201,168,76,0.6);
      --bg-thead:      #0D0C0A;
      --modal-shadow:  0 24px 80px rgba(0,0,0,0.6);
      --modal-text:    #F5ECD4;
      --cancel-border: rgba(255,255,255,0.12);
      --cancel-text:   #8B7A5A;
      --toggle-off:    #2A2418;
    }
    /* ── Tema Claro ── */
    [data-theme="light"] {
      --bg:            #F5F0E8;
      --bg-card:       #FDFAF5;
      --bg-input:      #FFFFFF;
      --bg-row-hover:  #F0E8D8;
      --text:          #1A2C10;
      --text-label:    #4A6B2A;
      --text-muted:    #5A7A38;
      --text-ph:       #9AB87A;
      --text-header:   #F5ECD4;
      --text-hsub:     rgba(245,236,212,0.7);
      --accent:        #2D5016;
      --accent-h:      #3A6820;
      --accent-text:   #F5ECD4;
      --border:        rgba(45,80,22,0.12);
      --border-input:  rgba(45,80,22,0.2);
      --border-modal:  rgba(196,168,76,0.35);
      --header-bg:     linear-gradient(180deg,#1A3A0A 0%,#2D5016 55%,#3A6820 100%);
      --header-border: rgba(196,168,76,0.3);
      --divider-color: rgba(196,168,76,0.7);
      --bg-thead:      #EDE5D4;
      --modal-shadow:  0 24px 80px rgba(45,80,22,0.15);
      --modal-text:    #1A2C10;
      --cancel-border: rgba(45,80,22,0.2);
      --cancel-text:   #5A7A38;
      --toggle-off:    #D4C9A8;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;transition:background .3s,color .3s}

    /* ── Header ── */
    .jj-header{background:var(--header-bg);color:white;padding:28px 20px 20px;text-align:center;position:relative;overflow:hidden;border-bottom:1px solid var(--header-border);transition:background .3s}
    .jj-header::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
    .jj-header-inner{position:relative;z-index:1}
    .jj-header-ornament{font-size:14px;letter-spacing:8px;color:var(--accent);opacity:0.8;margin-bottom:8px}
    [data-theme="light"] .jj-header-ornament{color:#C4A84C}
    .jj-header-title{font-size:clamp(32px,7vw,50px);font-weight:200;letter-spacing:clamp(6px,2vw,14px);color:var(--text-header);margin-bottom:4px;font-style:italic}
    .jj-header-divider{display:flex;align-items:center;gap:16px;justify-content:center;margin:8px 0}
    .jj-header-divider::before,.jj-header-divider::after{content:'';flex:1;max-width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--divider-color))}
    .jj-header-diamond{color:var(--accent);font-size:10px}
    [data-theme="light"] .jj-header-diamond{color:#C4A84C}
    .jj-header-subtitle{font-size:10px;letter-spacing:3px;color:var(--text-hsub);text-transform:uppercase}
    .conn-badge{position:absolute;top:14px;right:14px;z-index:2;display:flex;align-items:center;gap:6px;font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.15);background:rgba(0,0,0,0.25)}
    .conn-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .conn-badge.online .conn-dot{background:#4ADE80;box-shadow:0 0 6px rgba(74,222,128,0.5)}
    .conn-badge.online{color:rgba(74,222,128,0.9)}
    .conn-badge.offline .conn-dot{background:#9CA3AF}
    .conn-badge.offline{color:rgba(255,255,255,0.4)}
    .theme-btn{position:absolute;top:14px;left:14px;z-index:2;background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.15);border-radius:20px;cursor:pointer;font-size:16px;padding:3px 10px;line-height:1.6;transition:background .15s}
    .theme-btn:hover{background:rgba(0,0,0,0.4)}

    /* ── Nav ── */
    .jj-nav{background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;transition:background .3s}
    .jj-nav-link{padding:11px 20px;font-size:13px;font-weight:600;color:var(--text-muted);text-decoration:none;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;display:block}
    .jj-nav-link:hover{color:var(--accent)}
    .jj-nav-link.active{color:var(--accent);border-bottom-color:var(--accent)}

    /* ── Loading ── */
    .loading-screen{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
    .loading-logo{font-size:40px;font-weight:200;letter-spacing:12px;color:var(--text-header);font-style:italic}
    .loading-spinner{width:32px;height:32px;border:2px solid color-mix(in srgb, var(--accent) 20%, transparent);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    .loading-text{font-size:12px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Progress Bar ── */
    .forn-progress-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:20px}
    .forn-progress-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13px;color:var(--text-muted)}
    .forn-progress-pct{font-weight:700;color:var(--accent);font-size:16px}
    .forn-progress-bar{background:var(--border);border-radius:8px;height:8px;overflow:hidden}
    .forn-progress-fill{background:linear-gradient(90deg,var(--accent),var(--accent-h));height:100%;border-radius:8px;transition:width .5s ease}

    /* ── Category Card ── */
    .forn-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden;height:100%}
    .forn-card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg-thead);border-bottom:1px solid var(--border)}
    .forn-cat-info{display:flex;align-items:center;gap:7px}
    .forn-cat-icon{font-size:16px;line-height:1}
    .forn-cat-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-label)}
    .forn-cat-count{font-size:12px;color:var(--text-muted);white-space:nowrap}
    .forn-cat-count.all-done{color:#4ADE80;font-weight:700}

    /* ── Item Row ── */
    .forn-item{border-top:1px solid var(--border);transition:background .1s}
    .forn-item:hover{background:var(--bg-row-hover)}
    .forn-item-main{display:flex;align-items:center;gap:8px;padding:9px 12px}
    .forn-status-btn{background:none;border:none;cursor:pointer;font-size:17px;line-height:1;padding:2px 3px;border-radius:6px;transition:transform .12s;flex-shrink:0;user-select:none}
    .forn-status-btn:hover{transform:scale(1.25)}
    .forn-name{flex:1;font-size:14px;color:var(--text);cursor:pointer;border-radius:4px;padding:2px 5px;margin:-2px -5px;transition:background .1s;min-width:0;word-break:break-word}
    .forn-name:hover{background:rgba(201,168,76,0.08);text-decoration:underline;text-decoration-color:var(--accent);text-underline-offset:3px}
    .forn-item.contratado .forn-name{color:var(--text-muted);text-decoration:line-through;text-decoration-color:rgba(74,222,128,0.5)}
    .forn-name-input{flex:1;border:1px solid var(--accent);border-radius:6px;padding:4px 8px;font-size:14px;outline:none;background:var(--bg-input);color:var(--text);font-family:inherit;min-width:0}
    .forn-item-actions{display:flex;gap:1px;flex-shrink:0}
    .forn-action-btn{background:none;border:none;cursor:pointer;padding:5px 6px;border-radius:6px;font-size:14px;line-height:1;color:var(--text-muted);transition:background .1s}
    .forn-action-btn:hover{background:var(--bg-row-hover);color:var(--accent)}
    .forn-action-btn.del:hover{color:#DC2626;background:rgba(220,38,38,0.08)}
    .forn-action-btn.has-obs{color:var(--accent)}
    .forn-obs-wrap{padding:0 12px 10px 42px}
    .forn-obs-textarea{width:100%;border:1px solid var(--border-input);border-radius:8px;padding:8px 12px;font-size:12px;outline:none;background:var(--bg-input);color:var(--text);font-family:inherit;resize:vertical;min-height:56px;transition:border-color .15s;line-height:1.5}
    .forn-obs-textarea::placeholder{color:var(--text-ph)}
    .forn-obs-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent)}

    /* ── Add Item ── */
    .forn-add-btn{display:block;width:100%;padding:9px 14px;background:none;border:none;border-top:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:600;color:var(--text-muted);text-align:left;transition:all .15s}
    .forn-add-btn:hover{color:var(--accent);background:color-mix(in srgb, var(--accent) 5%, transparent)}
    .forn-add-input-row{display:flex;gap:8px;padding:8px 12px;border-top:1px solid var(--border);align-items:center}
    .forn-add-name-input{flex:1;border:1px solid var(--border-input);border-radius:8px;padding:7px 12px;font-size:13px;outline:none;background:var(--bg-input);color:var(--text);font-family:inherit;transition:border-color .15s}
    .forn-add-name-input::placeholder{color:var(--text-ph)}
    .forn-add-name-input:focus{border-color:var(--accent)}

    /* ── Buttons ── */
    .btn-save{padding:7px 14px;background:var(--accent);color:var(--accent-text);border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap}
    .btn-save:hover{background:var(--accent-h)}
    .btn-cancel{padding:7px 10px;background:transparent;border:1px solid var(--cancel-border);border-radius:8px;cursor:pointer;font-size:13px;color:var(--cancel-text);white-space:nowrap}
    .btn-cancel:hover{background:var(--bg-row-hover)}
    .btn-delete{padding:10px 24px;background:rgba(220,38,38,0.85);color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600}
    .btn-delete:hover{background:#DC2626}

    /* ── Form inputs ── */
    .jj-form-input{width:100%;border:1px solid var(--border-input);border-radius:8px;padding:9px 12px;font-size:14px;outline:none;background:var(--bg-input);color:var(--text);font-family:inherit;transition:border-color .15s}
    .jj-form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent)}

    /* ── Confirm Modal ── */
    .jj-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1050;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);padding:16px}
    .jj-modal{background:var(--bg-card);border:1px solid var(--border-modal);border-radius:16px;padding:28px 24px;width:100%;max-width:380px;box-shadow:var(--modal-shadow)}
    .jj-modal-title{font-size:17px;font-weight:700;color:var(--modal-text);margin-bottom:12px}
    .jj-modal-sub{font-size:13px;color:var(--text-muted);margin-bottom:0}
    .jj-modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}

    /* ── Empty state ── */
    .forn-empty{padding:14px 14px;font-size:12px;color:var(--text-muted);font-style:italic}

    @media(max-width:576px){
      .jj-nav-link{padding:10px 14px;font-size:12px}
      .forn-obs-wrap{padding:0 10px 10px 38px}
      .forn-card-header{padding:10px 12px}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Firebase (mesmo padrão e config do index.html) ─────────────
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDa3kZz55KfGvJtrUlmOhg-9HOSvCDNjFQ",
  authDomain:        "casamento-jj.firebaseapp.com",
  databaseURL:       "https://casamento-jj-default-rtdb.firebaseio.com",
  projectId:         "casamento-jj",
  storageBucket:     "casamento-jj.firebasestorage.app",
  messagingSenderId: "35657642946",
  appId:             "1:35657642946:web:31f25ba40efaffbe9f1c5b"
};
firebase.initializeApp(FIREBASE_CONFIG);
const FORN_REF = firebase.database().ref('fornecedores');

/*
  Firebase Realtime Database Rules (aberto para uso em equipe):
  {
    "rules": {
      ".read": true,
      ".write": true
    }
  }
*/

// ── Constantes ─────────────────────────────────────────────────
const CATEGORIAS = [
  { id: 'cerimonia',  label: 'Cerimônia',              icon: '⛪' },
  { id: 'recepcao',   label: 'Recepção e Festa',        icon: '🥂' },
  { id: 'doces',      label: 'Doces e Bebidas',         icon: '🎂' },
  { id: 'foto',       label: 'Foto e Vídeo',            icon: '📸' },
  { id: 'vestuario',  label: 'Vestuário e Beleza',      icon: '💍' },
  { id: 'papelaria',  label: 'Papelaria e Comunicação', icon: '📋' },
  { id: 'outros',     label: 'Outros',                  icon: '📦' },
];

const SEED = [
  { categoria:'cerimonia', nome:'Celebrante / Padre / Juiz de Paz', ordem:1 },
  { categoria:'cerimonia', nome:'Local da cerimônia',               ordem:2 },
  { categoria:'cerimonia', nome:'Decoração da cerimônia',           ordem:3 },
  { categoria:'cerimonia', nome:'Cerimonialista',                   ordem:4 },
  { categoria:'cerimonia', nome:'Assessora de casamento',           ordem:5 },
  { categoria:'recepcao',  nome:'Buffet / Catering',                ordem:1 },
  { categoria:'recepcao',  nome:'Local da festa',                   ordem:2 },
  { categoria:'recepcao',  nome:'Banda ao vivo',                    ordem:3 },
  { categoria:'recepcao',  nome:'DJ',                               ordem:4 },
  { categoria:'recepcao',  nome:'Decoração da festa',               ordem:5 },
  { categoria:'recepcao',  nome:'Iluminação cênica',                ordem:6 },
  { categoria:'doces',     nome:'Bolo de casamento',                ordem:1 },
  { categoria:'doces',     nome:'Mesa de doces / Bem-casados',      ordem:2 },
  { categoria:'doces',     nome:'Open bar / Bartender',             ordem:3 },
  { categoria:'foto',      nome:'Fotógrafo',                        ordem:1 },
  { categoria:'foto',      nome:'Videomaker / Cinegrafista',        ordem:2 },
  { categoria:'foto',      nome:'Cabine de fotos (photobooth)',     ordem:3 },
  { categoria:'vestuario', nome:'Vestido de noiva',                 ordem:1 },
  { categoria:'vestuario', nome:'Traje do noivo',                   ordem:2 },
  { categoria:'vestuario', nome:'Maquiagem',                        ordem:3 },
  { categoria:'vestuario', nome:'Cabelo',                           ordem:4 },
  { categoria:'vestuario', nome:'Alianças',                         ordem:5 },
  { categoria:'papelaria', nome:'Convites',                         ordem:1 },
  { categoria:'papelaria', nome:'Site do casamento',                ordem:2 },
  { categoria:'papelaria', nome:'Save the date',                    ordem:3 },
  { categoria:'outros',    nome:'Transporte',                       ordem:1 },
  { categoria:'outros',    nome:'Lua de mel',                       ordem:2 },
  { categoria:'outros',    nome:'Lista de presentes',               ordem:3 },
];

const STATUS_CYCLE = ['nao_iniciado', 'em_andamento', 'contratado'];
const STATUS_ICON  = { nao_iniciado: '⬜', em_andamento: '🔄', contratado: '✅' };

// ── ItemRow ────────────────────────────────────────────────────
function ItemRow({ item, onDeleteRequest, isAdmin }) {
  const [editingName, setEditingName] = useState(false);
  const [localName,   setLocalName]   = useState(item.nome);
  const [showObs,     setShowObs]     = useState(!!item.observacao);
  const [localObs,    setLocalObs]    = useState(item.observacao || '');
  const debRef    = useRef(null);
  const focusRef  = useRef(false);

  // Sync name from Firebase when not editing
  useEffect(() => { if (!editingName) setLocalName(item.nome); }, [item.nome]);

  // Sync obs from Firebase when textarea not focused
  useEffect(() => {
    if (!focusRef.current) setLocalObs(item.observacao || '');
  }, [item.observacao]);

  const cycleStatus = () => {
    const next = STATUS_CYCLE[(STATUS_CYCLE.indexOf(item.status) + 1) % STATUS_CYCLE.length];
    FORN_REF.child(item.id).update({ status: next });
  };

  const saveName = () => {
    const v = localName.trim();
    if (v) FORN_REF.child(item.id).update({ nome: v });
    else   setLocalName(item.nome);
    setEditingName(false);
  };

  const handleObs = (val) => {
    setLocalObs(val);
    clearTimeout(debRef.current);
    debRef.current = setTimeout(() => FORN_REF.child(item.id).update({ observacao: val }), 800);
  };

  return (
    <div className={`forn-item${item.status === 'contratado' ? ' contratado' : ''}`}>
      <div className="forn-item-main">
        <button className="forn-status-btn"
          onClick={isAdmin ? cycleStatus : undefined}
          style={isAdmin ? {} : {cursor:'default',opacity:.7}}
          title={item.status === 'nao_iniciado' ? 'Não iniciado' : item.status === 'em_andamento' ? 'Em andamento' : 'Contratado'}>
          {STATUS_ICON[item.status] || '⬜'}
        </button>

        {isAdmin && editingName ? (
          <input className="forn-name-input" value={localName}
            onChange={e => setLocalName(e.target.value)}
            onBlur={saveName}
            onKeyDown={e => {
              if (e.key === 'Enter')  saveName();
              if (e.key === 'Escape') { setLocalName(item.nome); setEditingName(false); }
            }}
            autoFocus />
        ) : (
          <span className="forn-name"
            onClick={isAdmin ? () => setEditingName(true) : undefined}
            title={isAdmin ? 'Clique para editar' : ''}
            style={isAdmin ? {} : {cursor:'default'}}>
            {item.nome}
          </span>
        )}

        <div className="forn-item-actions">
          <button
            className={`forn-action-btn${localObs ? ' has-obs' : ''}`}
            onClick={() => setShowObs(v => !v)}
            title={showObs ? 'Esconder observação' : 'Mostrar observação'}>
            💬
          </button>
          {isAdmin && (
            <button className="forn-action-btn del" onClick={onDeleteRequest} title="Remover item">
              🗑️
            </button>
          )}
        </div>
      </div>

      {showObs && (
        <div className="forn-obs-wrap">
          <textarea className="forn-obs-textarea" value={localObs}
            onChange={isAdmin ? e => handleObs(e.target.value) : undefined}
            readOnly={!isAdmin}
            onFocus={() => { focusRef.current = true; }}
            onBlur={()  => { focusRef.current = false; }}
            placeholder={isAdmin ? 'Fornecedor, valor, contato, data de pagamento...' : ''}
            style={isAdmin ? {} : {cursor:'default',color:'var(--text-muted)'}}
            rows={2} />
        </div>
      )}
    </div>
  );
}

// ── CategoryCard ───────────────────────────────────────────────
function CategoryCard({ cat, items, onDeleteRequest, isAdmin }) {
  const [adding,   setAdding]   = useState(false);
  const [newName,  setNewName]  = useState('');
  const inputRef = useRef();

  const catItems = items
    .filter(i => i.categoria === cat.id)
    .sort((a, b) => (a.ordem || 0) - (b.ordem || 0));

  const contratados = catItems.filter(i => i.status === 'contratado').length;
  const allDone = catItems.length > 0 && contratados === catItems.length;

  const confirmAdd = () => {
    const nome = newName.trim();
    if (!nome) { cancelAdd(); return; }
    const id = String(Date.now());
    const maxOrdem = catItems.length > 0 ? Math.max(...catItems.map(i => i.ordem || 0)) : 0;
    FORN_REF.child(id).set({
      id, categoria: cat.id, nome,
      status: 'nao_iniciado', observacao: '',
      ordem: maxOrdem + 1, criadoEm: Date.now()
    });
    setNewName('');
    setAdding(false);
  };

  const cancelAdd = () => { setNewName(''); setAdding(false); };

  return (
    <div className="forn-card">
      <div className="forn-card-header">
        <div className="forn-cat-info">
          <span className="forn-cat-icon">{cat.icon}</span>
          <span className="forn-cat-label">{cat.label}</span>
        </div>
        <span className={`forn-cat-count${allDone ? ' all-done' : ''}`}>
          {contratados}/{catItems.length}
        </span>
      </div>

      {catItems.length === 0 && !adding && (
        <div className="forn-empty">Nenhum item ainda.</div>
      )}

      {catItems.map(item => (
        <ItemRow key={item.id} item={item} isAdmin={isAdmin}
          onDeleteRequest={() => onDeleteRequest(item)} />
      ))}

      {isAdmin && (adding ? (
        <div className="forn-add-input-row">
          <input ref={inputRef} className="forn-add-name-input"
            placeholder="Nome do fornecedor ou serviço..."
            value={newName} onChange={e => setNewName(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') confirmAdd(); if (e.key === 'Escape') cancelAdd(); }}
            autoFocus />
          <button className="btn-save" onClick={confirmAdd}>✓</button>
          <button className="btn-cancel" onClick={cancelAdd}>✕</button>
        </div>
      ) : (
        <button className="forn-add-btn" onClick={() => setAdding(true)}>＋ Adicionar item</button>
      ))}
    </div>
  );
}

// ── DeleteModal ────────────────────────────────────────────────
function DeleteModal({ item, onConfirm, onClose }) {
  return (
    <div className="jj-overlay" onClick={onClose}>
      <div className="jj-modal" onClick={e => e.stopPropagation()}>
        <div className="jj-modal-title">Remover item?</div>
        <p className="jj-modal-sub">Tem certeza que quer remover <strong>{item.nome}</strong>? Essa ação remove para os dois.</p>
        <div className="jj-modal-actions">
          <button className="btn-cancel" onClick={onClose}>Cancelar</button>
          <button className="btn-delete" onClick={onConfirm}>Sim, remover</button>
        </div>
      </div>
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────
function App() {
  const [theme,   setTheme]   = useState(() => localStorage.getItem('jj-theme') || 'dark');
  const [items,   setItems]   = useState([]);
  const [loaded,  setLoaded]  = useState(false);
  const [online,  setOnline]  = useState(false);
  const [confirm, setConfirm] = useState(null);
  const isAdmin = true;

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('jj-theme', theme);
  }, [theme]);

  useEffect(() => {
    FORN_REF.on('value', snap => {
      const data = snap.val();
      if (data) {
        setItems(Object.values(data).filter(i => i && i.nome));
      } else {
        const obj = {};
        const base = Date.now();
        SEED.forEach((s, i) => {
          const id = String(base + i * 10);
          obj[id] = { id, ...s, status: 'nao_iniciado', observacao: '', criadoEm: base };
        });
        FORN_REF.set(obj);
      }
      setLoaded(true);
    });
    firebase.database().ref('.info/connected').on('value', snap => setOnline(!!snap.val()));
    return () => {
      FORN_REF.off();
      firebase.database().ref('.info/connected').off();
    };
  }, []);

  if (!loaded) return (
    <div className="loading-screen">
      <div className="loading-logo">J &amp; J</div>
      <div className="loading-spinner" />
      <div className="loading-text">conectando...</div>
    </div>
  );

  const total       = items.length;
  const contratados = items.filter(i => i.status === 'contratado').length;
  const pct         = total > 0 ? Math.round(contratados / total * 100) : 0;

  const handleDelete = () => {
    FORN_REF.child(confirm.id).remove();
    setConfirm(null);
  };

  return (
    <>
      <header className="jj-header">
        <button className="theme-btn"
          onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')}
          title={theme === 'dark' ? 'Tema claro' : 'Tema escuro'}>
          {theme === 'dark' ? '☀️' : '🌙'}
        </button>
        <div className={`conn-badge ${online ? 'online' : 'offline'}`}>
          <div className="conn-dot" />
          {online ? 'Ao vivo' : 'Offline'}
        </div>
        <div className="jj-header-inner">
          <div className="jj-header-ornament">✦ ✦ ✦</div>
          <div className="jj-header-title">J &amp; J</div>
          <div className="jj-header-divider"><span className="jj-header-diamond">◆</span></div>
          <div className="jj-header-subtitle">20 de Novembro de 2027 — Fornecedores</div>
        </div>
      </header>

      <nav className="jj-nav">
        <a href="./index.html"        className="jj-nav-link">👥 Convidados</a>
        <a href="./cerimonia.html"    className="jj-nav-link">💒 Cerimônia</a>
        <a href="./roteiro.html"      className="jj-nav-link">📋 Roteiro</a>
        <a href="./fornecedores.html" className="jj-nav-link active">🏪 Fornecedores</a>
        <a href="./gastos.html"       className="jj-nav-link">💰 Gastos</a>
        <a href="./extrato.html"      className="jj-nav-link">💳 Extrato</a>
      </nav>

      <div className="container-fluid px-3 px-md-4"
        style={{maxWidth:960, margin:'0 auto', paddingTop:24, paddingBottom:48}}>

        {/* Progresso geral */}
        <div className="forn-progress-wrap">
          <div className="forn-progress-label">
            <span>
              <strong style={{color:'var(--accent)',fontSize:15}}>{contratados}</strong>
              {' '}de{' '}
              <strong>{total}</strong>
              {' '}itens contratados
            </span>
            <span className="forn-progress-pct">{pct}%</span>
          </div>
          <div className="forn-progress-bar">
            <div className="forn-progress-fill" style={{width:`${pct}%`}} />
          </div>
        </div>

        {/* Cards por categoria — 2 colunas no desktop */}
        <div className="row g-3">
          {CATEGORIAS.map(cat => (
            <div key={cat.id} className="col-12 col-md-6">
              <CategoryCard cat={cat} items={items} isAdmin={isAdmin}
                onDeleteRequest={item => setConfirm(item)} />
            </div>
          ))}
        </div>
      </div>

      {isAdmin && confirm && (
        <DeleteModal item={confirm}
          onConfirm={handleDelete}
          onClose={() => setConfirm(null)} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
