  <style>
    :root {
      --bg:            #0C0B09;
      --bg-card:       #161410;
      --bg-input:      #0D0C0A;
      --bg-row-hover:  #181510;
      --text:          #E8DEC8;
      --text-label:    #6B5E45;
      --text-muted:    #5B5040;
      --text-ph:       #4B4030;
      --text-header:   #F5ECD4;
      --text-hsub:     rgba(255,255,255,0.35);
      --accent:        #C9A84C;
      --accent-h:      #E0BC5A;
      --accent-text:   #0C0B09;
      --border:        rgba(255,255,255,0.07);
      --border-input:  rgba(255,255,255,0.1);
      --border-modal:  rgba(201,168,76,0.2);
      --header-bg:     linear-gradient(180deg,#0A0806 0%,#140E06 60%,#0C0B09 100%);
      --header-border: rgba(201,168,76,0.15);
      --divider-color: rgba(201,168,76,0.6);
      --bg-thead:      #0D0C0A;
      --modal-shadow:  0 24px 80px rgba(0,0,0,0.6);
      --modal-text:    #F5ECD4;
      --cancel-border: rgba(255,255,255,0.12);
      --cancel-text:   #8B7A5A;
    }
    [data-theme="light"] {
      --bg:            #F5F0E8;
      --bg-card:       #FDFAF5;
      --bg-input:      #FFFFFF;
      --bg-row-hover:  #F0E8D8;
      --text:          #1A2C10;
      --text-label:    #4A6B2A;
      --text-muted:    #5A7A38;
      --text-ph:       #9AB87A;
      --text-header:   #F5ECD4;
      --text-hsub:     rgba(245,236,212,0.7);
      --accent:        #2D5016;
      --accent-h:      #3A6820;
      --accent-text:   #F5ECD4;
      --border:        rgba(45,80,22,0.12);
      --border-input:  rgba(45,80,22,0.2);
      --border-modal:  rgba(196,168,76,0.35);
      --header-bg:     linear-gradient(180deg,#1A3A0A 0%,#2D5016 55%,#3A6820 100%);
      --header-border: rgba(196,168,76,0.3);
      --divider-color: rgba(196,168,76,0.7);
      --bg-thead:      #EDE5D4;
      --modal-shadow:  0 24px 80px rgba(45,80,22,0.15);
      --modal-text:    #1A2C10;
      --cancel-border: rgba(45,80,22,0.2);
      --cancel-text:   #5A7A38;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;transition:background .3s,color .3s}

    .jj-header{background:var(--header-bg);color:white;padding:28px 20px 20px;text-align:center;position:relative;overflow:hidden;border-bottom:1px solid var(--header-border);transition:background .3s}
    .jj-header::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
    .jj-header-inner{position:relative;z-index:1}
    .jj-header-ornament{font-size:14px;letter-spacing:8px;color:var(--accent);opacity:0.8;margin-bottom:8px}
    [data-theme="light"] .jj-header-ornament{color:#C4A84C}
    .jj-header-title{font-size:clamp(32px,7vw,50px);font-weight:200;letter-spacing:clamp(6px,2vw,14px);color:var(--text-header);margin-bottom:4px;font-style:italic}
    .jj-header-divider{display:flex;align-items:center;gap:16px;justify-content:center;margin:8px 0}
    .jj-header-divider::before,.jj-header-divider::after{content:'';flex:1;max-width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--divider-color))}
    .jj-header-diamond{color:var(--accent);font-size:10px}
    [data-theme="light"] .jj-header-diamond{color:#C4A84C}
    .jj-header-subtitle{font-size:10px;letter-spacing:3px;color:var(--text-hsub);text-transform:uppercase}
    .conn-badge{position:absolute;top:14px;right:14px;z-index:2;display:flex;align-items:center;gap:6px;font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.15);background:rgba(0,0,0,0.25)}
    .conn-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .conn-badge.online .conn-dot{background:#4ADE80;box-shadow:0 0 6px rgba(74,222,128,0.5)}
    .conn-badge.online{color:rgba(74,222,128,0.9)}
    .conn-badge.offline .conn-dot{background:#9CA3AF}
    .conn-badge.offline{color:rgba(255,255,255,0.4)}
    .theme-btn{position:absolute;top:14px;left:14px;z-index:2;background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.15);border-radius:20px;cursor:pointer;font-size:16px;padding:3px 10px;line-height:1.6;transition:background .15s}
    .theme-btn:hover{background:rgba(0,0,0,0.4)}

    .jj-nav{background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;transition:background .3s}
    .jj-nav-link{padding:11px 20px;font-size:13px;font-weight:600;color:var(--text-muted);text-decoration:none;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;display:block}
    .jj-nav-link:hover{color:var(--accent)}
    .jj-nav-link.active{color:var(--accent);border-bottom-color:var(--accent)}

    .loading-screen{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
    .loading-logo{font-size:40px;font-weight:200;letter-spacing:12px;color:var(--text-header);font-style:italic}
    .loading-spinner{width:32px;height:32px;border:2px solid color-mix(in srgb, var(--accent) 20%, transparent);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    .loading-text{font-size:12px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes jj-shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}

    /* Cards */
    .cer-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
    .cer-card-header{display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--bg-thead);border-bottom:1px solid var(--border)}
    .cer-card-icon{font-size:16px}
    .cer-card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-label)}
    .cer-card-count{font-size:12px;color:var(--text-muted);margin-left:auto}

    /* Função rows (label: valor) */
    .cer-funcao-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-top:1px solid var(--border);transition:background .1s}
    .cer-funcao-row:hover{background:var(--bg-row-hover)}
    .cer-funcao-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-label);min-width:190px;flex-shrink:0}
    .cer-funcao-value{font-size:14px;color:var(--text);flex:1;cursor:pointer;border-radius:4px;padding:2px 6px;margin:-2px -6px;transition:background .1s}
    .cer-funcao-value:hover{background:rgba(201,168,76,0.08);text-decoration:underline;text-decoration-color:var(--accent);text-underline-offset:3px}
    .cer-funcao-value.readonly{cursor:default}
    .cer-funcao-value.readonly:hover{background:none;text-decoration:none}

    /* Lista items (familia / padrinhos) */
    .cer-list-item{display:flex;align-items:center;gap:10px;padding:9px 16px;border-top:1px solid var(--border);transition:background .1s}
    .cer-list-item:hover{background:var(--bg-row-hover)}
    .cer-list-num{font-size:11px;font-weight:700;color:var(--text-muted);min-width:20px;text-align:right;flex-shrink:0}
    .cer-list-bullet{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:.5;flex-shrink:0}
    .cer-list-name{flex:1;font-size:14px;color:var(--text);cursor:pointer;border-radius:4px;padding:2px 5px;margin:-2px -5px;transition:background .1s}
    .cer-list-name:hover{background:rgba(201,168,76,0.08);text-decoration:underline;text-decoration-color:var(--accent);text-underline-offset:3px}
    .cer-list-name.readonly{cursor:default}
    .cer-list-name.readonly:hover{background:none;text-decoration:none}
    .cer-del-btn{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:6px;font-size:13px;color:var(--text-muted);transition:background .1s;flex-shrink:0;line-height:1}
    .cer-del-btn:hover{background:rgba(220,38,38,0.08);color:#DC2626}
    .cer-add-btn{display:block;width:100%;padding:9px 16px;background:none;border:none;border-top:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:600;color:var(--text-muted);text-align:left;transition:all .15s}
    .cer-add-btn:hover{color:var(--accent);background:color-mix(in srgb, var(--accent) 5%, transparent)}
    .cer-add-row{display:flex;gap:8px;padding:8px 16px;border-top:1px solid var(--border);align-items:center}

    /* Inputs */
    .cer-inline-input{flex:1;border:1px solid var(--accent);border-radius:6px;padding:4px 8px;font-size:14px;outline:none;background:var(--bg-input);color:var(--text);font-family:inherit;min-width:0}
    .jj-form-input{width:100%;border:1px solid var(--border-input);border-radius:8px;padding:9px 12px;font-size:14px;outline:none;background:var(--bg-input);color:var(--text);font-family:inherit;transition:border-color .15s}
    .jj-form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent)}

    /* Buttons */
    .btn-save{padding:7px 14px;background:var(--accent);color:var(--accent-text);border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap}
    .btn-save:hover{background:var(--accent-h)}
    .btn-cancel{padding:7px 10px;background:transparent;border:1px solid var(--cancel-border);border-radius:8px;cursor:pointer;font-size:13px;color:var(--cancel-text);white-space:nowrap}
    .btn-cancel:hover{background:var(--bg-row-hover)}
    .btn-delete{padding:10px 24px;background:rgba(220,38,38,0.85);color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600}
    .btn-delete:hover{background:#DC2626}

    /* Modal */
    .jj-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1050;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);padding:16px}
    .jj-modal{background:var(--bg-card);border:1px solid var(--border-modal);border-radius:16px;padding:28px 24px;width:100%;max-width:380px;box-shadow:var(--modal-shadow)}
    .jj-modal-title{font-size:17px;font-weight:700;color:var(--modal-text);margin-bottom:12px}
    .jj-modal-sub{font-size:13px;color:var(--text-muted)}
    .jj-modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}

    @media(max-width:576px){
      .jj-nav-link{padding:10px 14px;font-size:12px}
      .cer-funcao-label{min-width:130px}
    }
  </style>
</head>

// ── InlineText ─────────────────────────────────────────────────
function InlineText({ value, onSave, isAdmin, className }) {
  const [editing, setEditing] = useState(false);
  const [local, setLocal]     = useState(value);
  useEffect(() => { if (!editing) setLocal(value); }, [value]);
  const save = () => { const v = local.trim(); if (v) onSave(v); else setLocal(value); setEditing(false); };
  if (isAdmin && editing) return (
    <input className="cer-inline-input" value={local}
      onChange={e => setLocal(e.target.value)}
      onBlur={save}
      onKeyDown={e => { if (e.key === 'Enter') save(); if (e.key === 'Escape') { setLocal(value); setEditing(false); } }}
      autoFocus />
  );
  return (
    <span className={`${className}${isAdmin ? '' : ' readonly'}`}
      onClick={isAdmin ? () => setEditing(true) : undefined}
      title={isAdmin ? 'Clique para editar' : ''}>
      {value}
    </span>
  );
}

// ── FuncoesCard ────────────────────────────────────────────────
function FuncoesCard({ funcoes, isAdmin }) {
  return (
    <div className="cer-card">
      <div className="cer-card-header">
        <span className="cer-card-icon">💒</span>
        <span className="cer-card-title">Funções Principais</span>
      </div>
      {FUNCOES_DEF.map(f => (
        <div key={f.key} className="cer-funcao-row">
          <span className="cer-funcao-label">{f.label}</span>
          <InlineText
            value={funcoes[f.key] || '—'}
            isAdmin={isAdmin}
            className="cer-funcao-value"
            onSave={v => CER_REF.child('funcoes').child(f.key).set(v)} />
        </div>
      ))}
    </div>
  );
}

// ── ListCard ───────────────────────────────────────────────────
function ListCard({ icon, title, items, fbPath, numbered, isAdmin, onDeleteRequest }) {
  const [adding, setAdding] = useState(false);
  const [newNome, setNewNome] = useState('');
  const sorted = Object.entries(items || {})
    .map(([id, v]) => ({ id, ...v }))
    .sort((a, b) => (a.ordem || 0) - (b.ordem || 0));

  const confirmAdd = () => {
    const nome = newNome.trim();
    if (!nome) { setAdding(false); return; }
    const maxOrdem = sorted.length > 0 ? Math.max(...sorted.map(i => i.ordem || 0)) : -1;
    const id = String(Date.now());
    CER_REF.child(fbPath).child(id).set({ nome, ordem: maxOrdem + 1 });
    setNewNome(''); setAdding(false);
  };

  return (
    <div className="cer-card">
      <div className="cer-card-header">
        <span className="cer-card-icon">{icon}</span>
        <span className="cer-card-title">{title}</span>
        <span className="cer-card-count">{sorted.length}</span>
      </div>
      {sorted.map((item, idx) => (
        <div key={item.id} className="cer-list-item">
          {numbered
            ? <span className="cer-list-num">{idx + 1}.</span>
            : <span className="cer-list-bullet" />}
          <InlineText
            value={item.nome}
            isAdmin={isAdmin}
            className="cer-list-name"
            onSave={v => CER_REF.child(fbPath).child(item.id).update({ nome: v })} />
          {isAdmin && (
            <button className="cer-del-btn" onClick={() => onDeleteRequest(fbPath, item)} title="Remover">🗑️</button>
          )}
        </div>
      ))}
      {isAdmin && (adding ? (
        <div className="cer-add-row">
          <input className="cer-inline-input" placeholder="Nome..."
            value={newNome} onChange={e => setNewNome(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') confirmAdd(); if (e.key === 'Escape') { setAdding(false); setNewNome(''); } }}
            autoFocus />
          <button className="btn-save" onClick={confirmAdd}>✓</button>
          <button className="btn-cancel" onClick={() => { setAdding(false); setNewNome(''); }}>✕</button>
        </div>
      ) : (
        <button className="cer-add-btn" onClick={() => setAdding(true)}>＋ Adicionar</button>
      ))}
    </div>
  );
}

// ── NovinhosCard ───────────────────────────────────────────────
function NovinhosCard({ novinhas, isAdmin }) {

    <div className="cer-card">
      <div className="cer-card-header">

}

// ── DeleteModal ────────────────────────────────────────────────
function DeleteModal({ item, onConfirm, onClose }) {
  return (
    <div className="jj-overlay" onClick={onClose}>
      <div className="jj-modal" onClick={e => e.stopPropagation()}>
        <div className="jj-modal-title">Remover?</div>
        <p className="jj-modal-sub">Remover <strong>{item.nome}</strong>? Esta ação é para os dois.</p>
        <div className="jj-modal-actions">
          <button className="btn-cancel" onClick={onClose}>Cancelar</button>
          <button className="btn-delete" onClick={onConfirm}>Sim, remover</button>
        </div>
      </div>
    </div>
  );
}

// ── LoginGate ──────────────────────────────────────────────────
function LoginGate() {
  const [mode,   setMode]   = useState('pin');
  const [digits, setDigits] = useState([]);
  const [shake,  setShake]  = useState(false);
  const [email,  setEmail]  = useState('');
  const [pw,     setPw]     = useState('');
  const [err,    setErr]    = useState('');
  const [busy,   setBusy]   = useState(false);

  const addDigit = d => setDigits(prev => prev.length >= 4 ? prev : [...prev, d]);
  const delDigit = () => setDigits(prev => prev.slice(0, -1));

  useEffect(() => {
    if (digits.length !== 4) return;
    const t = setTimeout(() => {
      if (window.JJGuard.validate(digits.join(''))) {
        window.JJGuard.grant(); firebase.auth().signInAnonymously();
      } else {
        setShake(true);
        setTimeout(() => { setShake(false); setDigits([]); }, 600);
      }
    }, 120);
    return () => clearTimeout(t);
  }, [digits]);

  useEffect(() => {
    if (mode !== 'pin') return;
    const h = e => {
      if (e.key >= '0' && e.key <= '9') addDigit(e.key);
      if (e.key === 'Backspace') delDigit();
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [mode]);

  const loginAdmin = () => {
    setBusy(true); setErr('');
    firebase.auth().signInWithEmailAndPassword(email, pw)
      .catch(() => { setErr('E-mail ou senha incorretos.'); setBusy(false); });
  };

  const hdr = (
    <div style={{textAlign:'center'}}>
      <div style={{fontSize:13,letterSpacing:8,color:'var(--accent)',opacity:.8,marginBottom:12}}>✦ ✦ ✦</div>
      <div style={{fontSize:'clamp(40px,10vw,64px)',fontWeight:200,letterSpacing:'clamp(8px,2vw,16px)',color:'var(--text-header)',fontStyle:'italic'}}>J &amp; J</div>
      <div style={{display:'flex',alignItems:'center',gap:16,justifyContent:'center',margin:'10px 0'}}>
        <div style={{flex:1,maxWidth:80,height:1,background:'linear-gradient(90deg,transparent,rgba(201,168,76,.6))'}} />
        <span style={{color:'var(--accent)',fontSize:10}}>◆</span>
        <div style={{flex:1,maxWidth:80,height:1,background:'linear-gradient(90deg,rgba(201,168,76,.6),transparent)'}} />
      </div>
      <div style={{fontSize:11,letterSpacing:3,color:'var(--text-muted)',textTransform:'uppercase'}}>20 de Novembro de 2027</div>
    </div>
  );

  if (mode === 'admin') return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:'24px',gap:28}}>
      {hdr}
      <div style={{background:'var(--bg-card)',border:'1px solid var(--border-modal)',borderRadius:16,padding:'28px 24px',width:'100%',maxWidth:320,boxShadow:'var(--modal-shadow)'}}>
        <div style={{marginBottom:10}}>
          <label style={{display:'block',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:1.5,color:'var(--text-label)',marginBottom:5}}>E-mail</label>
          <input className="jj-form-input" type="email" autoFocus value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key === 'Enter' && loginAdmin()} />
        </div>
        <div style={{marginBottom:16}}>
          <label style={{display:'block',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:1.5,color:'var(--text-label)',marginBottom:5}}>Senha</label>
          <input className="jj-form-input" type="password" value={pw} onChange={e => setPw(e.target.value)} onKeyDown={e => e.key === 'Enter' && loginAdmin()} />
        </div>
        {err && <p style={{color:'#EF4444',fontSize:12,margin:'0 0 12px'}}>{err}</p>}
        <button style={{width:'100%',padding:'12px',background:'var(--accent)',color:'var(--accent-text)',border:'none',borderRadius:8,cursor:'pointer',fontSize:14,fontWeight:700,marginBottom:12,fontFamily:'inherit'}}
          onClick={loginAdmin} disabled={busy}>{busy ? 'Entrando...' : 'Entrar'}</button>
        <div style={{textAlign:'center'}}>
          <button style={{background:'none',border:'none',cursor:'pointer',fontSize:12,color:'var(--text-muted)',fontFamily:'inherit',padding:0}}
            onClick={() => { setMode('pin'); setErr(''); setPw(''); setEmail(''); }}>← Voltar</button>
        </div>
      </div>
    </div>
  );

  const btn = {width:64,height:64,borderRadius:'50%',border:'1px solid var(--border)',background:'var(--bg-card)',
    color:'var(--text)',fontSize:22,fontWeight:300,cursor:'pointer',fontFamily:'inherit',
    display:'flex',alignItems:'center',justifyContent:'center',transition:'background .1s'};

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:'24px',gap:32}}>
      {hdr}
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:24}}>
        <div style={{fontSize:11,letterSpacing:3,color:'var(--text-muted)',textTransform:'uppercase'}}>Código de acesso</div>
        <div style={{display:'flex',gap:16,animation:shake?'jj-shake .5s':'none'}}>
          {[0,1,2,3].map(i => (
            <div key={i} style={{width:14,height:14,borderRadius:'50%',
              background:digits.length>i?'var(--accent)':'transparent',
              border:`2px solid ${digits.length>i?'var(--accent)':'rgba(201,168,76,.3)'}`,
              transition:'all .15s'}} />
          ))}
        </div>
        {shake && <div style={{fontSize:12,color:'#EF4444',letterSpacing:.5,marginTop:-8}}>Código incorreto</div>}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,64px)',gap:14}}>
          {[1,2,3,4,5,6,7,8,9].map(n => (
            <button key={n} style={btn} onClick={() => addDigit(String(n))}>{n}</button>
          ))}
          <div />
          <button style={btn} onClick={() => addDigit('0')}>0</button>
          <button style={{...btn,fontSize:18}} onClick={delDigit}>⌫</button>
        </div>
        <button style={{background:'none',border:'1px solid var(--border-modal)',cursor:'pointer',fontSize:12,
          color:'var(--accent)',fontFamily:'inherit',padding:'8px 20px',letterSpacing:1,
          textTransform:'uppercase',marginTop:4,borderRadius:8,opacity:.8}}
          onClick={() => setMode('admin')}>🔑 Noivos</button>
      </div>
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────
function App() {
  const [theme,       setTheme]       = useState(() => localStorage.getItem('jj-theme') || 'dark');
  const [data,        setData]        = useState(null);
  const [loaded,      setLoaded]      = useState(false);
  const [online,      setOnline]      = useState(false);
  const [currentUser, setCurrentUser] = useState(undefined);
  const [isAdmin,     setIsAdmin]     = useState(false);
  const [confirm,     setConfirm]     = useState(null); // { fbPath, item }

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('jj-theme', theme);
  }, [theme]);

  useEffect(() => {
    let attached = false;
    const unsubAuth = firebase.auth().onAuthStateChanged(user => {
      if (user && user.isAnonymous && !window.JJGuard.isGranted()) {
        firebase.auth().signOut(); return;
      }
      setCurrentUser(user);
      if (!user) return;
      setIsAdmin(ADMIN_UIDS.includes(user.uid));
      if (attached) return;
      attached = true;
      CER_REF.on('value', snap => {
        const val = snap.val();
        if (val) {
          setData(val);
        } else {
          CER_REF.set(SEED);
        }
        setLoaded(true);
      });
      firebase.database().ref('.info/connected').on('value', snap => setOnline(!!snap.val()));
    });
    return () => {
      unsubAuth();
      CER_REF.off();
      firebase.database().ref('.info/connected').off();
    };
  }, []);

  if (currentUser === undefined) return (
    <div className="loading-screen">
      <div className="loading-logo">J &amp; J</div>
      <div className="loading-spinner" />
    </div>
  );

  if (currentUser === null) return <LoginGate />;

  if (!loaded) return (
    <div className="loading-screen">
      <div className="loading-logo">J &amp; J</div>
      <div className="loading-spinner" />
      <div className="loading-text">conectando...</div>
    </div>
  );

  const handleDelete = () => {
    CER_REF.child(confirm.fbPath).child(confirm.item.id).remove();
    setConfirm(null);
  };

  return (
    <>
      <header className="jj-header">
        <button className="theme-btn"
          onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')}
          title={theme === 'dark' ? 'Tema claro' : 'Tema escuro'}>
          {theme === 'dark' ? '☀️' : '🌙'}
        </button>
        <div className={`conn-badge ${online ? 'online' : 'offline'}`}>
          <div className="conn-dot" />
          {online ? 'Ao vivo' : 'Offline'}
        </div>
        <div className="jj-header-inner">
          <div className="jj-header-ornament">✦ ✦ ✦</div>
          <div className="jj-header-title">J &amp; J</div>
          <div className="jj-header-divider"><span className="jj-header-diamond">◆</span></div>
          <div className="jj-header-subtitle">20 de Novembro de 2027 — Cerimônia</div>
        </div>
      </header>

      <nav className="jj-nav">
        <a href="./index.html"         className="jj-nav-link">👥 Convidados</a>
        <a href="./cerimonia.html"     className="jj-nav-link active">💒 Cerimônia</a>
        {isAdmin && <a href="./fornecedores.html" className="jj-nav-link">🏪 Fornecedores</a>}
        {isAdmin && <a href="./gastos.html"       className="jj-nav-link">💰 Gastos</a>}
        {isAdmin && <a href="./extrato.html"      className="jj-nav-link">💳 Extrato</a>}
        <button className="jj-nav-link" style={{marginLeft:'auto',border:'none',background:'none',cursor:'pointer'}}
          onClick={() => firebase.auth().signOut()}>
          {isAdmin ? '🔓 Sair' : '🔑 Admin'}
        </button>
      </nav>

      <div style={{maxWidth:720,margin:'0 auto',padding:'24px 16px 48px'}}>
        {isAdmin && (
          <div style={{background:'color-mix(in srgb, var(--accent) 8%, transparent)',border:'1px solid var(--border-modal)',borderRadius:10,padding:'10px 14px',marginBottom:20,fontSize:12,color:'var(--text-muted)',display:'flex',alignItems:'center',gap:8}}>
            <span style={{color:'var(--accent)'}}>✏️</span>
            Clique em qualquer valor para editar. Alterações são salvas automaticamente.
          </div>
        )}

        <FuncoesCard
          funcoes={data?.funcoes || {}}
          isAdmin={isAdmin} />

        <ListCard
          icon="👨‍👩‍👧"
          title="Pais, Avós e Irmã"
          items={data?.familia || {}}
          fbPath="familia"
          numbered={false}
          isAdmin={isAdmin}
          onDeleteRequest={(fbPath, item) => setConfirm({ fbPath, item })} />

        <ListCard
          icon="💍"
          title="Padrinhos"
          items={data?.padrinhos || {}}
          fbPath="padrinhos"
          numbered={true}
          isAdmin={isAdmin}
          onDeleteRequest={(fbPath, item) => setConfirm({ fbPath, item })} />

        <NovinhosCard
          novinhas={data?.novinhas || {}}
          isAdmin={isAdmin} />
      </div>

      {isAdmin && confirm && (
        <DeleteModal
          item={confirm.item}
          onConfirm={handleDelete}
          onClose={() => setConfirm(null)} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
