<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J & J — Extrato</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="./pin-guard.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    /* ── Tema Escuro (padrão) ── */
    :root {
      --bg:            #0C0B09;
      --bg-card:       #161410;
      --bg-input:      #0D0C0A;
      --bg-row-hover:  #181510;
      --text:          #E8DEC8;
      --text-label:    #6B5E45;
      --text-muted:    #5B5040;
      --text-ph:       #4B4030;
      --text-header:   #F5ECD4;
      --text-hsub:     rgba(255,255,255,0.35);
      --accent:        #C9A84C;
      --accent-h:      #E0BC5A;
      --accent-text:   #0C0B09;
      --border:        rgba(255,255,255,0.07);
      --border-input:  rgba(255,255,255,0.1);
      --border-modal:  rgba(201,168,76,0.2);
      --header-bg:     linear-gradient(180deg,#0A0806 0%,#140E06 60%,#0C0B09 100%);
      --header-border: rgba(201,168,76,0.15);
      --divider-color: rgba(201,168,76,0.6);
      --bg-thead:      #0D0C0A;
      --modal-shadow:  0 24px 80px rgba(0,0,0,0.6);
      --modal-text:    #F5ECD4;
      --cancel-border: rgba(255,255,255,0.12);
      --cancel-text:   #8B7A5A;
    }
    [data-theme="light"] {
      --bg:            #F5F0E8;
      --bg-card:       #FDFAF5;
      --bg-input:      #FFFFFF;
      --bg-row-hover:  #F0E8D8;
      --text:          #1A2C10;
      --text-label:    #4A6B2A;
      --text-muted:    #5A7A38;
      --text-ph:       #9AB87A;
      --text-header:   #F5ECD4;
      --text-hsub:     rgba(245,236,212,0.7);
      --accent:        #2D5016;
      --accent-h:      #3A6820;
      --accent-text:   #F5ECD4;
      --border:        rgba(45,80,22,0.12);
      --border-input:  rgba(45,80,22,0.2);
      --border-modal:  rgba(196,168,76,0.35);
      --header-bg:     linear-gradient(180deg,#1A3A0A 0%,#2D5016 55%,#3A6820 100%);
      --header-border: rgba(196,168,76,0.3);
      --divider-color: rgba(196,168,76,0.7);
      --bg-thead:      #EDE5D4;
      --modal-shadow:  0 24px 80px rgba(45,80,22,0.15);
      --modal-text:    #1A2C10;
      --cancel-border: rgba(45,80,22,0.2);
      --cancel-text:   #5A7A38;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;transition:background .3s,color .3s}

    /* ── Header ── */
    .jj-header{background:var(--header-bg);color:white;padding:28px 20px 20px;text-align:center;position:relative;overflow:hidden;border-bottom:1px solid var(--header-border);transition:background .3s}
    .jj-header::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
    .jj-header-inner{position:relative;z-index:1}
    .jj-header-ornament{font-size:14px;letter-spacing:8px;color:var(--accent);opacity:0.8;margin-bottom:8px}
    [data-theme="light"] .jj-header-ornament{color:#C4A84C}
    .jj-header-title{font-size:clamp(32px,7vw,50px);font-weight:200;letter-spacing:clamp(6px,2vw,14px);color:var(--text-header);margin-bottom:4px;font-style:italic}
    .jj-header-divider{display:flex;align-items:center;gap:16px;justify-content:center;margin:8px 0}
    .jj-header-divider::before,.jj-header-divider::after{content:'';flex:1;max-width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--divider-color))}
    .jj-header-diamond{color:var(--accent);font-size:10px}
    [data-theme="light"] .jj-header-diamond{color:#C4A84C}
    .jj-header-subtitle{font-size:10px;letter-spacing:3px;color:var(--text-hsub);text-transform:uppercase}
    .conn-badge{position:absolute;top:14px;right:14px;z-index:2;display:flex;align-items:center;gap:6px;font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.15);background:rgba(0,0,0,0.25)}
    .conn-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    @keyframes jj-shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
    .conn-badge.online .conn-dot{background:#4ADE80;box-shadow:0 0 6px rgba(74,222,128,0.5)}
    .conn-badge.online{color:rgba(74,222,128,0.9)}
    .conn-badge.offline .conn-dot{background:#9CA3AF}
    .conn-badge.offline{color:rgba(255,255,255,0.4)}
    .theme-btn{position:absolute;top:14px;left:14px;z-index:2;background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.15);border-radius:20px;cursor:pointer;font-size:16px;padding:3px 10px;line-height:1.6;transition:background .15s}
    .theme-btn:hover{background:rgba(0,0,0,0.4)}

    /* ── Nav ── */
    .jj-nav{background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;transition:background .3s}
    .jj-nav-link{padding:11px 20px;font-size:13px;font-weight:600;color:var(--text-muted);text-decoration:none;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;display:block}
    .jj-nav-link:hover{color:var(--accent)}
    .jj-nav-link.active{color:var(--accent);border-bottom-color:var(--accent)}

    /* ── Loading ── */
    .loading-screen{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
    .loading-logo{font-size:40px;font-weight:200;letter-spacing:12px;color:var(--text-header);font-style:italic}
    .loading-spinner{width:32px;height:32px;border:2px solid color-mix(in srgb,var(--accent) 20%,transparent);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    .loading-text{font-size:12px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Summary cards ── */
    .ext-summary{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:16px}
    .ext-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .ext-card{text-align:center;padding:12px 8px;border-radius:8px;border:1px solid var(--border);background:var(--bg)}
    .ext-card-label{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin-bottom:5px}
    .ext-card-val{font-size:clamp(12px,2.5vw,18px);font-weight:700;color:var(--text);line-height:1.2}
    .ext-card-val.green{color:#4ADE80}
    .ext-card-val.accent{color:var(--accent)}
    .ext-card-sub{font-size:10px;color:var(--text-muted);margin-top:3px}

    /* ── Controls ── */
    .controls-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center}
    .filter-chip{padding:7px 14px;border-radius:20px;border:1px solid var(--border-input);background:var(--bg-card);cursor:pointer;font-size:12px;font-weight:500;color:var(--text-muted);transition:all .15s;white-space:nowrap;user-select:none}
    .filter-chip:hover{border-color:var(--accent);color:var(--accent)}
    .filter-chip.active{background:var(--accent);color:var(--accent-text);border-color:var(--accent);font-weight:700}
    .g-select{border:1px solid var(--border-input);border-radius:8px;padding:8px 12px;font-size:13px;background:var(--bg-card);color:var(--text);outline:none;cursor:pointer;font-family:inherit;-webkit-appearance:none;appearance:none}
    .g-select:focus{border-color:var(--accent)}
    .g-select option{background:var(--bg-card);color:var(--text)}
    .search-input{border:1px solid var(--border-input);border-radius:8px;padding:8px 12px;font-size:13px;background:var(--bg-card);color:var(--text);outline:none;font-family:inherit;min-width:180px;flex:1}
    .search-input:focus{border-color:var(--accent)}
    .search-input::placeholder{color:var(--text-ph)}
    .date-range{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .date-range input{border:1px solid var(--border-input);border-radius:8px;padding:7px 10px;font-size:13px;background:var(--bg-card);color:var(--text);outline:none;font-family:inherit;-webkit-appearance:none;appearance:none}
    .date-range input:focus{border-color:var(--accent)}
    .date-range span{font-size:12px;color:var(--text-muted)}
    .copy-btn{padding:9px 14px;background:var(--bg-card);border:1px solid var(--border-input);border-radius:8px;cursor:pointer;font-size:13px;color:var(--text-muted);transition:all .15s;white-space:nowrap}
    .copy-btn:hover{border-color:var(--accent);color:var(--accent)}
    .copy-btn.copied{border-color:#4ADE80;color:#4ADE80}

    /* ── Month group ── */
    .month-group{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px}
    .month-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg-thead);border-bottom:1px solid var(--border)}
    .month-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-label)}
    .month-sub{text-align:right}
    .month-total{font-size:13px;font-weight:700;color:var(--accent);display:block}
    .month-count{font-size:9px;color:var(--text-muted);letter-spacing:.5px}

    /* ── Extrato row ── */
    .ext-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:1px solid var(--border);transition:background .1s;flex-wrap:wrap}
    .ext-row:hover{background:var(--bg-row-hover)}
    .ext-date{font-size:11px;color:var(--text-muted);white-space:nowrap;flex-shrink:0;min-width:76px}
    .ext-nome{flex:1;min-width:120px;font-size:13px;font-weight:500;color:var(--text)}
    .ext-cat{flex-shrink:0}
    .ext-cat-badge{font-size:10px;padding:2px 8px;border-radius:20px;background:color-mix(in srgb,var(--accent) 10%,transparent);color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 25%,transparent);white-space:nowrap}
    .ext-val{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;flex-shrink:0;min-width:90px;text-align:right}
    .ext-obs{width:100%;font-size:11px;color:var(--text-muted);font-style:italic;padding-left:76px}

    /* ── Empty ── */
    .empty-state{padding:48px 20px;text-align:center;color:var(--text-muted)}
    .empty-icon{font-size:36px;margin-bottom:12px}

    /* ── Modal (login) ── */
    .jj-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1050;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);padding:16px}
    .jj-modal{background:var(--bg-card);border:1px solid var(--border-modal);border-radius:16px;padding:24px 22px;width:100%;max-width:500px;box-shadow:var(--modal-shadow);max-height:90vh;overflow-y:auto}
    .jj-modal-title{font-size:17px;font-weight:700;color:var(--modal-text);margin-bottom:18px}
    .jj-form-group{margin-bottom:12px}
    .jj-form-label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-label);margin-bottom:5px}
    .jj-form-input{width:100%;border:1px solid var(--border-input);border-radius:8px;padding:9px 12px;font-size:14px;outline:none;background:var(--bg-input);color:var(--text);font-family:inherit;transition:border-color .15s}
    .jj-form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent)}
    .jj-modal-actions{display:flex;gap:10px;margin-top:18px;justify-content:flex-end;flex-wrap:wrap}
    .btn-cancel{padding:9px 18px;background:transparent;border:1px solid var(--cancel-border);border-radius:8px;cursor:pointer;font-size:14px;color:var(--cancel-text)}
    .btn-cancel:hover{background:rgba(0,0,0,0.05)}
    .btn-save{padding:9px 22px;background:var(--accent);color:var(--accent-text);border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700}
    .btn-save:hover{background:var(--accent-h)}

    @media(max-width:640px){
      .ext-grid{grid-template-columns:repeat(2,1fr)}
      .ext-obs{padding-left:0}
      .ext-row{gap:6px}
    }
    @media(max-width:400px){
      .ext-val{min-width:70px}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// ── Firebase — mesmo config do projeto ────────────────────────
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDa3kZz55KfGvJtrUlmOhg-9HOSvCDNjFQ",
  authDomain:        "casamento-jj.firebaseapp.com",
  databaseURL:       "https://casamento-jj-default-rtdb.firebaseio.com",
  projectId:         "casamento-jj",
  storageBucket:     "casamento-jj.firebasestorage.app",
  messagingSenderId: "35657642946",
  appId:             "1:35657642946:web:31f25ba40efaffbe9f1c5b"
};
firebase.initializeApp(FIREBASE_CONFIG);
const ADMIN_UIDS = ['0XrGEivRvCbZVEfO2tQmGD712dl1','jK1hJfvkRLUUjl9uGNhEHRY3Xlu1'];
const EXTRATO_REF = firebase.database().ref('extrato');

// ── Constantes ─────────────────────────────────────────────────
const CATEGORIAS = [
  { id: 'cerimonia',  label: 'Cerimônia',              icon: '⛪' },
  { id: 'recepcao',   label: 'Recepção e Festa',        icon: '🥂' },
  { id: 'doces',      label: 'Doces e Bebidas',         icon: '🎂' },
  { id: 'foto',       label: 'Foto e Vídeo',            icon: '📸' },
  { id: 'vestuario',  label: 'Vestuário e Beleza',      icon: '💍' },
  { id: 'papelaria',  label: 'Papelaria e Comunicação', icon: '📋' },
  { id: 'viagem',     label: 'Viagem / Lua de Mel',     icon: '✈️'  },
  { id: 'outros',     label: 'Outros',                  icon: '📦' },
];

const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                   'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

// ── Utilidades ─────────────────────────────────────────────────
const fmt = v =>
  (v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

// DD/MM/AAAA → Date (null se inválido)
const parseDate = str => {
  if (!str || !/^\d{2}\/\d{2}\/\d{4}$/.test(str)) return null;
  const [d, m, y] = str.split('/');
  const dt = new Date(+y, +m - 1, +d);
  return isNaN(dt.getTime()) ? null : dt;
};

// YYYY-MM-DD → DD/MM/AAAA
const fromInputDate = ymd => {
  if (!ymd) return '';
  const [y, m, d] = ymd.split('-');
  return `${d}/${m}/${y}`;
};

// DD/MM/AAAA → chave de mês "MM/AAAA"
const monthKey = str => {
  if (!str || !/^\d{2}\/\d{2}\/\d{4}$/.test(str)) return '??/????';
  const parts = str.split('/');
  return `${parts[1]}/${parts[2]}`;
};

// "MM/AAAA" → "Mês AAAA" em português
const fmtMonth = key => {
  if (!key || key === '??/????') return 'Sem data';
  const [m, y] = key.split('/');
  return `${MONTHS_PT[parseInt(m) - 1]} ${y}`;
};

// "MM/AAAA" → número para ordenação (maior = mais recente)
const monthSortVal = key => {
  if (!key || key === '??/????') return 0;
  const [m, y] = key.split('/');
  return parseInt(y) * 100 + parseInt(m);
};

// YYYY-MM-DD do início/fim do mês atual e anterior
const nowDate = new Date();
const thisMonthStart = new Date(nowDate.getFullYear(), nowDate.getMonth(), 1);
const thisMonthEnd   = new Date(nowDate.getFullYear(), nowDate.getMonth() + 1, 0);
const lastMonthStart = new Date(nowDate.getFullYear(), nowDate.getMonth() - 1, 1);
const lastMonthEnd   = new Date(nowDate.getFullYear(), nowDate.getMonth(), 0);

const dateToInput = dt => {
  if (!dt) return '';
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
};

const catMeta = id => CATEGORIAS.find(c => c.id === id) || { label: id, icon: '📦' };

// ── LoginGate ─────────────────────────────────────────────────
function LoginGate() {
  const [mode,   setMode]   = useState('pin');
  const [digits, setDigits] = useState([]);
  const [shake,  setShake]  = useState(false);
  const [email,  setEmail]  = useState('');
  const [pw,     setPw]     = useState('');
  const [err,    setErr]    = useState('');
  const [busy,   setBusy]   = useState(false);

  const addDigit = d => setDigits(prev => prev.length >= 4 ? prev : [...prev, d]);
  const delDigit = () => setDigits(prev => prev.slice(0, -1));

  useEffect(() => {
    if (digits.length !== 4) return;
    const t = setTimeout(() => {
      if (window.JJGuard.validate(digits.join(''))) {
        window.JJGuard.grant();
        firebase.auth().signInAnonymously();
      } else {
        setShake(true);
        setTimeout(() => { setShake(false); setDigits([]); }, 600);
      }
    }, 120);
    return () => clearTimeout(t);
  }, [digits]);

  useEffect(() => {
    if (mode !== 'pin') return;
    const h = e => {
      if (e.key >= '0' && e.key <= '9') addDigit(e.key);
      if (e.key === 'Backspace') delDigit();
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [mode]);

  const loginAdmin = () => {
    setBusy(true); setErr('');
    firebase.auth().signInWithEmailAndPassword(email, pw)
      .catch(() => { setErr('E-mail ou senha incorretos.'); setBusy(false); });
  };

  const hdr = (
    <div style={{textAlign:'center'}}>
      <div style={{fontSize:13,letterSpacing:8,color:'var(--accent)',opacity:.8,marginBottom:12}}>✦ ✦ ✦</div>
      <div style={{fontSize:'clamp(40px,10vw,64px)',fontWeight:200,letterSpacing:'clamp(8px,2vw,16px)',color:'var(--text-header)',fontStyle:'italic'}}>J &amp; J</div>
      <div style={{display:'flex',alignItems:'center',gap:16,justifyContent:'center',margin:'10px 0'}}>
        <div style={{flex:1,maxWidth:80,height:1,background:'linear-gradient(90deg,transparent,rgba(201,168,76,.6))'}} />
        <span style={{color:'var(--accent)',fontSize:10}}>◆</span>
        <div style={{flex:1,maxWidth:80,height:1,background:'linear-gradient(90deg,rgba(201,168,76,.6),transparent)'}} />
      </div>
      <div style={{fontSize:11,letterSpacing:3,color:'var(--text-muted)',textTransform:'uppercase'}}>20 de Novembro de 2027</div>
    </div>
  );

  if (mode === 'admin') return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:'24px',gap:28}}>
      {hdr}
      <div style={{background:'var(--bg-card)',border:'1px solid var(--border-modal)',borderRadius:16,padding:'28px 24px',width:'100%',maxWidth:320,boxShadow:'var(--modal-shadow)'}}>
        <div style={{marginBottom:10}}>
          <label style={{display:'block',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:1.5,color:'var(--text-label)',marginBottom:5}}>E-mail</label>
          <input className="jj-form-input" type="email" autoFocus value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key === 'Enter' && loginAdmin()} />
        </div>
        <div style={{marginBottom:16}}>
          <label style={{display:'block',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:1.5,color:'var(--text-label)',marginBottom:5}}>Senha</label>
          <input className="jj-form-input" type="password" value={pw} onChange={e => setPw(e.target.value)} onKeyDown={e => e.key === 'Enter' && loginAdmin()} />
        </div>
        {err && <p style={{color:'#EF4444',fontSize:12,margin:'0 0 12px'}}>{err}</p>}
        <button style={{width:'100%',padding:'12px',background:'var(--accent)',color:'var(--accent-text)',border:'none',borderRadius:8,cursor:'pointer',fontSize:14,fontWeight:700,marginBottom:12,fontFamily:'inherit'}}
          onClick={loginAdmin} disabled={busy}>{busy ? 'Entrando...' : 'Entrar'}</button>
        <div style={{textAlign:'center'}}>
          <button style={{background:'none',border:'none',cursor:'pointer',fontSize:12,color:'var(--text-muted)',fontFamily:'inherit',padding:0}}
            onClick={() => { setMode('pin'); setErr(''); setPw(''); setEmail(''); }}>← Voltar</button>
        </div>
      </div>
    </div>
  );

  const btn = {width:64,height:64,borderRadius:'50%',border:'1px solid var(--border)',background:'var(--bg-card)',
    color:'var(--text)',fontSize:22,fontWeight:300,cursor:'pointer',fontFamily:'inherit',
    display:'flex',alignItems:'center',justifyContent:'center',transition:'background .1s'};

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:'24px',gap:32}}>
      {hdr}
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:24}}>
        <div style={{fontSize:11,letterSpacing:3,color:'var(--text-muted)',textTransform:'uppercase'}}>Código de acesso</div>
        <div style={{display:'flex',gap:16,animation:shake?'jj-shake .5s':'none'}}>
          {[0,1,2,3].map(i => (
            <div key={i} style={{width:14,height:14,borderRadius:'50%',
              background:digits.length>i?'var(--accent)':'transparent',
              border:`2px solid ${digits.length>i?'var(--accent)':'rgba(201,168,76,.3)'}`,
              transition:'all .15s'}} />
          ))}
        </div>
        {shake && <div style={{fontSize:12,color:'#EF4444',letterSpacing:.5,marginTop:-8}}>Código incorreto</div>}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,64px)',gap:14}}>
          {[1,2,3,4,5,6,7,8,9].map(n => (
            <button key={n} style={btn} onClick={() => addDigit(String(n))}>{n}</button>
          ))}
          <div />
          <button style={btn} onClick={() => addDigit('0')}>0</button>
          <button style={{...btn,fontSize:18}} onClick={delDigit}>⌫</button>
        </div>
        <button style={{background:'none',border:'1px solid var(--border-modal)',cursor:'pointer',fontSize:12,
          color:'var(--accent)',fontFamily:'inherit',padding:'8px 20px',letterSpacing:1,
          textTransform:'uppercase',marginTop:4,borderRadius:8,opacity:.8}}
          onClick={() => setMode('admin')}>🔑 Noivos</button>
      </div>
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────
function App() {
  const [theme,    setTheme]    = useState(() => localStorage.getItem('jj-theme') || 'dark');
  const [extrato,  setExtrato]  = useState([]);
  const [loaded,   setLoaded]   = useState(false);
  const [online,   setOnline]   = useState(false);
  const [period,     setPeriod]     = useState('all');   // all | thisMonth | lastMonth | custom
  const [dateFrom,   setDateFrom]   = useState('');
  const [dateTo,     setDateTo]     = useState('');
  const [filterCat,  setFilterCat]  = useState('all');
  const [search,     setSearch]     = useState('');
  const [copied,     setCopied]     = useState(false);
  const [currentUser, setCurrentUser] = useState(undefined);
  const [isAdmin,     setIsAdmin]     = useState(false);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('jj-theme', theme);
  }, [theme]);

  useEffect(() => {
    let attached = false;
    const unsubAuth = firebase.auth().onAuthStateChanged(user => {
      if (user && user.isAnonymous && !window.JJGuard.isGranted()) {
        firebase.auth().signOut(); return;
      }
      setCurrentUser(user);
      if (!user) return;
      const admin = ADMIN_UIDS.includes(user.uid);
      setIsAdmin(admin);
      if (!admin || attached) return;
      attached = true;
      EXTRATO_REF.on('value', snap => {
        const data = snap.val();
        setExtrato(data ? Object.values(data).filter(e => e && e.id) : []);
        setLoaded(true);
      });
      firebase.database().ref('.info/connected').on('value', snap => setOnline(!!snap.val()));
    });
    return () => {
      unsubAuth();
      EXTRATO_REF.off();
      firebase.database().ref('.info/connected').off();
    };
  }, []);

  // ── Filtragem ──
  const filtered = useMemo(() => {
    let list = [...extrato];

    // Filtro por período
    if (period === 'thisMonth') {
      list = list.filter(e => {
        const d = parseDate(e.data);
        return d && d >= thisMonthStart && d <= thisMonthEnd;
      });
    } else if (period === 'lastMonth') {
      list = list.filter(e => {
        const d = parseDate(e.data);
        return d && d >= lastMonthStart && d <= lastMonthEnd;
      });
    } else if (period === 'custom') {
      const from = dateFrom ? parseDate(fromInputDate(dateFrom)) : null;
      const to   = dateTo   ? parseDate(fromInputDate(dateTo))   : null;
      list = list.filter(e => {
        const d = parseDate(e.data);
        if (!d) return false;
        if (from && d < from) return false;
        if (to   && d > to)   return false;
        return true;
      });
    }

    // Filtro por categoria
    if (filterCat !== 'all') list = list.filter(e => e.gastoCategoria === filterCat);

    // Busca
    if (search.trim()) {
      const q = search.trim().toLowerCase();
      list = list.filter(e =>
        (e.gastoNome  || '').toLowerCase().includes(q) ||
        (e.observacao || '').toLowerCase().includes(q)
      );
    }

    // Ordenação: mais recente primeiro
    list.sort((a, b) => (b.criadoEm || 0) - (a.criadoEm || 0));
    return list;
  }, [extrato, period, dateFrom, dateTo, filterCat, search]);

  // ── Estatísticas gerais (sobre todos os dados, não só filtrados) ──
  const totalTransferido = extrato.reduce((s, e) => s + (e.valor || 0), 0);
  const numTransferencias = extrato.length;

  const topMonth = useMemo(() => {
    const totals = {};
    extrato.forEach(e => {
      const k = monthKey(e.data);
      totals[k] = (totals[k] || 0) + (e.valor || 0);
    });
    const entries = Object.entries(totals);
    if (!entries.length) return null;
    const best = entries.sort((a, b) => b[1] - a[1])[0];
    return { label: fmtMonth(best[0]), valor: best[1] };
  }, [extrato]);

  // ── Agrupamento por mês ──
  const monthGroups = useMemo(() => {
    const groups = {};
    filtered.forEach(e => {
      const k = monthKey(e.data);
      if (!groups[k]) groups[k] = { key: k, label: fmtMonth(k), entries: [], total: 0 };
      groups[k].entries.push(e);
      groups[k].total += (e.valor || 0);
    });
    return Object.values(groups).sort((a, b) => monthSortVal(b.key) - monthSortVal(a.key));
  }, [filtered]);

  // ── Copiar extrato ──
  const copyExtrato = () => {
    const lines = ['💳 *Extrato J&J*\n'];
    const label = period === 'thisMonth' ? 'Este mês'
                : period === 'lastMonth' ? 'Mês passado'
                : period === 'custom'    ? `${fromInputDate(dateFrom)} a ${fromInputDate(dateTo)}`
                : 'Todos os períodos';
    lines.push(`_Período: ${label}_\n`);
    monthGroups.forEach(g => {
      lines.push(`\n📅 *${g.label}* — ${fmt(g.total)}`);
      g.entries.forEach(e => {
        const cat = catMeta(e.gastoCategoria);
        lines.push(`${e.data} | ${e.gastoNome} | ${cat.icon} ${cat.label} | ${fmt(e.valor)}${e.observacao ? ' | ' + e.observacao : ''}`);
      });
    });
    const total = filtered.reduce((s, e) => s + (e.valor || 0), 0);
    lines.push(`\n💰 Total no período: ${fmt(total)}`);
    lines.push(`📊 ${filtered.length} transferência${filtered.length !== 1 ? 's' : ''}`);
    navigator.clipboard.writeText(lines.join('\n')).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  if (currentUser === undefined) return (
    <div className="loading-screen">
      <div className="loading-logo">J &amp; J</div>
      <div className="loading-spinner" />
    </div>
  );

  if (currentUser === null) return <LoginGate />;

  if (!isAdmin) return (
    <div className="loading-screen" style={{gap:20}}>
      <div className="loading-logo">J &amp; J</div>
      <div style={{fontSize:32}}>🔒</div>
      <div style={{fontSize:15,fontWeight:600,color:'var(--text)'}}>Acesso restrito</div>
      <div style={{fontSize:13,color:'var(--text-muted)',textAlign:'center',maxWidth:280}}>
        Esta página é exclusiva para administradores.
      </div>
      <button className="btn-save" style={{marginTop:8}} onClick={() => firebase.auth().signOut()}>
        🔑 Entrar como admin
      </button>
    </div>
  );

  if (!loaded) return (
    <div className="loading-screen">
      <div className="loading-logo">J &amp; J</div>
      <div className="loading-spinner" />
      <div className="loading-text">carregando...</div>
    </div>
  );

  return (
    <>
      <header className="jj-header">
        <button className="theme-btn"
          onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')}
          title={theme === 'dark' ? 'Tema claro' : 'Tema escuro'}>
          {theme === 'dark' ? '☀️' : '🌙'}
        </button>
        <div className={`conn-badge ${online ? 'online' : 'offline'}`}>
          <div className="conn-dot" />
          {online ? 'Ao vivo' : 'Offline'}
        </div>
        <div className="jj-header-inner">
          <div className="jj-header-ornament">✦ ✦ ✦</div>
          <div className="jj-header-title">J &amp; J</div>
          <div className="jj-header-divider"><span className="jj-header-diamond">◆</span></div>
          <div className="jj-header-subtitle">20 de Novembro de 2027 — Extrato de Pagamentos</div>
        </div>
      </header>

      <nav className="jj-nav">
        <a href="./index.html"        className="jj-nav-link">👥 Convidados</a>
        <a href="./cerimonia.html"    className="jj-nav-link">💒 Cerimônia</a>
        <a href="./fornecedores.html" className="jj-nav-link">🏪 Fornecedores</a>
        <a href="./gastos.html"       className="jj-nav-link">💰 Gastos</a>
        <a href="./extrato.html"      className="jj-nav-link active">💳 Extrato</a>
        <button className="jj-nav-link" style={{marginLeft:'auto',border:'none',background:'none',cursor:'pointer'}}
          onClick={() => firebase.auth().signOut()}>
          🔓 Sair
        </button>
      </nav>

      <div className="container-fluid px-3 px-md-4"
        style={{maxWidth:960, margin:'0 auto', paddingTop:20, paddingBottom:48}}>

        {/* Cards de resumo */}
        <div className="ext-summary">
          <div className="ext-grid">
            <div className="ext-card">
              <div className="ext-card-label">Total Transferido</div>
              <div className="ext-card-val green">{fmt(totalTransferido)}</div>
              <div className="ext-card-sub">todos os períodos</div>
            </div>
            <div className="ext-card">
              <div className="ext-card-label">Transferências</div>
              <div className="ext-card-val accent">{numTransferencias}</div>
              <div className="ext-card-sub">registradas</div>
            </div>
            <div className="ext-card">
              <div className="ext-card-label">Mês com Mais Volume</div>
              {topMonth ? (
                <>
                  <div className="ext-card-val" style={{fontSize:'clamp(10px,1.8vw,14px)'}}>{topMonth.label}</div>
                  <div className="ext-card-sub">{fmt(topMonth.valor)}</div>
                </>
              ) : (
                <div className="ext-card-val" style={{color:'var(--text-muted)',fontSize:12}}>—</div>
              )}
            </div>
          </div>
        </div>

        {/* Barra de controles */}
        <div className="controls-bar">
          {/* Filtro por período */}
          {[
            { id: 'all',       label: 'Todos' },
            { id: 'thisMonth', label: 'Este mês' },
            { id: 'lastMonth', label: 'Mês passado' },
            { id: 'custom',    label: '📅 Personalizado' },
          ].map(p => (
            <button key={p.id}
              className={`filter-chip${period === p.id ? ' active' : ''}`}
              onClick={() => setPeriod(p.id)}>
              {p.label}
            </button>
          ))}
        </div>

        {/* Intervalo personalizado */}
        {period === 'custom' && (
          <div className="controls-bar" style={{marginTop:-8}}>
            <div className="date-range">
              <input type="date" value={dateFrom} onChange={e => setDateFrom(e.target.value)} />
              <span>até</span>
              <input type="date" value={dateTo}   onChange={e => setDateTo(e.target.value)} />
            </div>
          </div>
        )}

        <div className="controls-bar">
          {/* Filtro por categoria */}
          <select className="g-select" value={filterCat} onChange={e => setFilterCat(e.target.value)}>
            <option value="all">Todas categorias</option>
            {CATEGORIAS.map(c => <option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
          </select>

          {/* Busca */}
          <input className="search-input" placeholder="🔍 Buscar por gasto ou observação..."
            value={search} onChange={e => setSearch(e.target.value)} />

          <div style={{flex:1}} />

          <button className={`copy-btn${copied ? ' copied' : ''}`} onClick={copyExtrato}>
            {copied ? '✓ Copiado!' : '📋 Copiar extrato'}
          </button>
        </div>

        {/* Lista agrupada por mês */}
        {extrato.length === 0 ? (
          <div className="empty-state">
            <div className="empty-icon">💳</div>
            <div style={{fontSize:15,fontWeight:600,marginBottom:6}}>Nenhum pagamento registrado ainda</div>
            <div style={{fontSize:13}}>Acesse <a href="./gastos.html" style={{color:'var(--accent)'}}>Gastos</a> e registre o primeiro pagamento.</div>
          </div>
        ) : filtered.length === 0 ? (
          <div className="empty-state">
            <div className="empty-icon">🔍</div>
            <div>Nenhum pagamento encontrado com esses filtros.</div>
          </div>
        ) : (
          <>
            {monthGroups.map(group => (
              <div key={group.key} className="month-group">
                <div className="month-header">
                  <span className="month-name">📅 {group.label}</span>
                  <div className="month-sub">
                    <span className="month-total">{fmt(group.total)}</span>
                    <span className="month-count">{group.entries.length} transferência{group.entries.length !== 1 ? 's' : ''}</span>
                  </div>
                </div>

                {group.entries.map(e => {
                  const cat = catMeta(e.gastoCategoria);
                  return (
                    <div key={e.id} className="ext-row">
                      <span className="ext-date">{e.data}</span>
                      <span className="ext-nome">{e.gastoNome || '—'}</span>
                      <span className="ext-cat">
                        <span className="ext-cat-badge">{cat.icon} {cat.label}</span>
                      </span>
                      <span className="ext-val">{fmt(e.valor)}</span>
                      {e.observacao && (
                        <span className="ext-obs">{e.observacao}</span>
                      )}
                    </div>
                  );
                })}
              </div>
            ))}

            {/* Total do período filtrado */}
            <div style={{
              textAlign:'right', padding:'12px 4px',
              fontSize:13, color:'var(--text-muted)',
              borderTop:'1px solid var(--border)', marginTop:4
            }}>
              {filtered.length} transferência{filtered.length !== 1 ? 's' : ''} no período
              <strong style={{color:'var(--accent)',marginLeft:10}}>
                {fmt(filtered.reduce((s,e) => s + (e.valor||0), 0))}
              </strong>
            </div>
          </>
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
